<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Με τι έχεις ταξιδέψει; — Γ' Δημοτικού</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900;800&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --sky1: #87CEEB;
    --sky2: #B8E4F9;
    --sea: #1A6BB5;
    --grass: #4CAF50;
    --road: #555;
    --sun: #FFD700;
    --white: #fff;
    --card-bg: rgba(255,255,255,0.93);
    --accent: #FF6B35;
    --text-dark: #1a1a2e;
    --shadow: 0 8px 32px rgba(26,107,181,0.18);
  }

  body {
    font-family: 'Nunito', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
    position: relative;
  }

  .bg-sky {
    position: fixed;
    inset: 0;
    background: linear-gradient(180deg, #4FC3F7 0%, #87CEEB 40%, #B3E5FC 65%, #81C784 65%, #4CAF50 72%, #388E3C 100%);
    z-index: 0;
  }

  .sun {
    position: fixed;
    top: 30px;
    right: 80px;
    width: 70px;
    height: 70px;
    background: #FFD700;
    border-radius: 50%;
    z-index: 1;
    box-shadow: 0 0 0 14px rgba(255,215,0,0.2), 0 0 0 28px rgba(255,215,0,0.1);
    animation: pulse-sun 3s ease-in-out infinite;
  }
  @keyframes pulse-sun {
    0%, 100% { box-shadow: 0 0 0 14px rgba(255,215,0,0.2), 0 0 0 28px rgba(255,215,0,0.1); }
    50% { box-shadow: 0 0 0 20px rgba(255,215,0,0.25), 0 0 0 40px rgba(255,215,0,0.12); }
  }

  .cloud {
    position: fixed;
    z-index: 1;
    animation: cloud-drift linear infinite;
  }
  .cloud-body {
    background: #fff;
    border-radius: 50px;
    position: relative;
  }
  .cloud-body::before, .cloud-body::after {
    content: '';
    position: absolute;
    background: #fff;
    border-radius: 50%;
  }
  @keyframes cloud-drift {
    0%   { transform: translateX(-250px); }
    100% { transform: translateX(calc(100vw + 250px)); }
  }

  .road {
    position: fixed;
    bottom: 0;
    left: 0; right: 0;
    height: 90px;
    background: #546E7A;
    z-index: 2;
  }
  .road::before {
    content: '';
    position: absolute;
    top: 50%;
    left: 0; right: 0;
    height: 6px;
    background: repeating-linear-gradient(90deg, #FFD700 0px, #FFD700 40px, transparent 40px, transparent 80px);
    transform: translateY(-50%);
  }

  .sea {
    position: fixed;
    bottom: 90px;
    left: 0; right: 0;
    height: 60px;
    background: #1565C0;
    z-index: 1;
    overflow: hidden;
  }
  .sea::after {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 14px;
    background: repeating-linear-gradient(90deg, rgba(255,255,255,0.15) 0px, rgba(255,255,255,0.15) 20px, transparent 20px, transparent 40px);
    animation: wave 2s linear infinite;
  }
  @keyframes wave { 0%{background-position:0 0;} 100%{background-position:40px 0;} }

  .vehicle {
    position: fixed;
    z-index: 3;
    animation: move-right linear infinite;
    user-select: none;
    pointer-events: none;
  }
  .vehicle.rtl { animation-name: move-left; }
  .vehicle svg { display: block; }
  @keyframes move-right {
    0%   { transform: translateX(-220px); }
    100% { transform: translateX(calc(100vw + 220px)); }
  }
  @keyframes move-left {
    0%   { transform: translateX(calc(100vw + 220px)) scaleX(-1); }
    100% { transform: translateX(-220px) scaleX(-1); }
  }
  .vehicle.plane-lane { animation-name: fly-right; }
  .vehicle.plane-lane.rtl { animation-name: fly-left; }
  @keyframes fly-right {
    0%   { transform: translateX(-300px) translateY(0px); }
    25%  { transform: translateX(25vw) translateY(-12px); }
    50%  { transform: translateX(50vw) translateY(0px); }
    75%  { transform: translateX(75vw) translateY(10px); }
    100% { transform: translateX(calc(100vw + 300px)) translateY(0px); }
  }
  @keyframes fly-left {
    0%   { transform: translateX(calc(100vw + 300px)) scaleX(-1) translateY(0px); }
    100% { transform: translateX(-300px) scaleX(-1) translateY(0px); }
  }
  .vehicle.boat-lane { bottom: 92px; }

  #app {
    position: relative;
    z-index: 10;
    max-width: 700px;
    margin: 0 auto;
    padding: 24px 16px 200px;
    min-height: 100vh;
  }

  .hero-card {
    background: rgba(255,255,255,0.92);
    border-radius: 28px;
    padding: 22px 24px 18px;
    text-align: center;
    margin-bottom: 18px;
    backdrop-filter: blur(6px);
    border: 2px solid rgba(255,255,255,0.8);
    box-shadow: var(--shadow);
    animation: slide-down 0.6s ease both;
  }
  @keyframes slide-down {
    from { transform: translateY(-30px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }
  .hero-card h1 {
    font-size: 30px;
    font-weight: 900;
    color: #0D47A1;
    line-height: 1.1;
  }
  .hero-card p {
    font-size: 14px;
    color: #546E7A;
    margin-top: 4px;
    font-weight: 700;
  }

  .panel {
    background: rgba(255,255,255,0.93);
    border-radius: 24px;
    padding: 18px 18px 16px;
    margin-bottom: 14px;
    backdrop-filter: blur(6px);
    border: 2px solid rgba(255,255,255,0.8);
    box-shadow: var(--shadow);
    animation: fade-up 0.5s ease both;
  }
  @keyframes fade-up {
    from { transform: translateY(20px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }
  .panel:nth-child(2) { animation-delay: 0.1s; }
  .panel:nth-child(3) { animation-delay: 0.2s; }
  .panel:nth-child(4) { animation-delay: 0.3s; }

  .panel-title {
    font-size: 12px;
    font-weight: 900;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: #1565C0;
    margin-bottom: 12px;
  }

  .t-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 8px;
  }
  @media (max-width: 480px) { .t-grid { grid-template-columns: repeat(3, 1fr); } }

  .t-card {
    background: #F0F7FF;
    border: 2.5px solid #BBDEFB;
    border-radius: 16px;
    padding: 10px 4px 8px;
    cursor: pointer;
    text-align: center;
    transition: transform 0.15s, border-color 0.15s, background 0.15s;
    user-select: none;
  }
  .t-card:hover { transform: translateY(-4px) scale(1.04); border-color: #1565C0; }
  .t-card.sel {
    border-color: #1565C0;
    background: #BBDEFB;
    transform: translateY(-4px) scale(1.05);
    box-shadow: 0 6px 18px rgba(21,101,192,0.25);
  }
  .t-card .t-emoji { font-size: 32px; display: block; line-height: 1.1; }
  .t-card .t-label { font-size: 11px; font-weight: 900; color: #0D47A1; margin: 4px 0 6px; display: block; }
  .t-card .t-count {
    display: inline-block;
    background: #1565C0;
    color: #fff;
    font-size: 14px;
    font-weight: 900;
    width: 28px;
    height: 28px;
    border-radius: 50%;
    line-height: 28px;
  }
  .t-card.sel .t-count { background: #0D47A1; }

  .input-row {
    display: flex;
    gap: 8px;
    align-items: center;
    flex-wrap: wrap;
  }
  .name-input {
    flex: 1;
    min-width: 140px;
    height: 44px;
    border: 2.5px solid #BBDEFB;
    border-radius: 14px;
    padding: 0 14px;
    font-family: 'Nunito', sans-serif;
    font-size: 15px;
    font-weight: 700;
    color: #0D47A1;
    background: #F0F7FF;
    outline: none;
    transition: border-color 0.15s;
  }
  .name-input:focus { border-color: #1565C0; background: #fff; }
  .name-input::placeholder { color: #90A4AE; font-weight: 400; }

  .btn-add {
    height: 44px;
    padding: 0 20px;
    background: #1565C0;
    color: #fff;
    border: none;
    border-radius: 14px;
    font-family: 'Nunito', sans-serif;
    font-size: 15px;
    font-weight: 900;
    cursor: pointer;
    transition: background 0.12s, transform 0.1s;
  }
  .btn-add:hover { background: #0D47A1; }
  .btn-add:active { transform: scale(0.96); }

  .btn-reset {
    height: 44px;
    padding: 0 16px;
    background: #fff;
    color: #90A4AE;
    border: 2.5px solid #ECEFF1;
    border-radius: 14px;
    font-family: 'Nunito', sans-serif;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    transition: border-color 0.12s, color 0.12s;
  }
  .btn-reset:hover { border-color: #EF9A9A; color: #C62828; }

  .hint-box {
    background: #FFF8E1;
    border-left: 4px solid #FFB300;
    border-radius: 0 12px 12px 0;
    padding: 8px 14px;
    font-size: 13px;
    color: #E65100;
    font-weight: 700;
    margin-top: 10px;
    display: none;
  }
  .hint-box.show { display: block; }

  .toast {
    text-align: center;
    font-size: 20px;
    font-weight: 900;
    color: #1565C0;
    min-height: 30px;
    padding: 4px 0;
    letter-spacing: 1px;
  }

  .chips-wrap { display: flex; flex-wrap: wrap; gap: 7px; }
  .chip {
    display: flex;
    align-items: center;
    gap: 5px;
    background: #E3F2FD;
    border: 2px solid #90CAF9;
    border-radius: 999px;
    padding: 4px 10px 4px 8px;
    font-size: 13px;
    font-weight: 700;
    color: #0D47A1;
  }
  .chip .cx {
    background: none;
    border: none;
    cursor: pointer;
    color: #90A4AE;
    font-size: 15px;
    padding: 0;
    line-height: 1;
    margin-left: 3px;
  }
  .chip .cx:hover { color: #C62828; }

  .chart-box {
    background: #fff;
    border-radius: 18px;
    border: 2px solid #BBDEFB;
    padding: 14px 12px;
  }
  .chart-title-inner {
    font-size: 14px;
    font-weight: 900;
    color: #0D47A1;
    text-align: center;
    margin-bottom: 10px;
  }
  .chart-legend {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    justify-content: center;
    margin-top: 12px;
    font-size: 12px;
    font-weight: 700;
    font-family: 'Nunito', sans-serif;
  }
</style>
</head>

<div id="app">
  <div class="hero-card">
    <h1>✈️ Με τι έχεις ταξιδέψει; 🚢</h1>
    <p>Καταγραφή μεταφορικών μέσων — Γ' Δημοτικού</p>
  </div>

  <div class="panel">
    <div class="panel-title">① Επίλεξε μεταφορικό μέσο</div>
    <div class="t-grid" id="tGrid"></div>
  </div>

  <div class="panel">
    <div class="panel-title">② Γράψε το όνομα του μαθητή</div>
    <div class="input-row">
      <input class="name-input" id="nameInput" type="text" placeholder="π.χ. Νίκος, Μαρία..." maxlength="24" />
      <button class="btn-add" onclick="addStudent()">+ Προσθήκη</button>
      <button class="btn-reset" onclick="resetAll()">Καθαρισμός</button>
    </div>
    <div class="hint-box" id="hint">⚠️ Επίλεξε τουλάχιστον ένα μεταφορικό μέσο!</div>
    <div class="toast" id="toast"></div>
  </div>

  <div class="panel" id="studentsPanel" style="display:none;">
    <div class="panel-title">Μαθητές που έχουν καταχωρηθεί</div>
    <div class="chips-wrap" id="chips"></div>
  </div>

  <div class="panel" id="chartPanel" style="display:none;">
    <div class="panel-title">Ραβδόγραμμα αποτελεσμάτων</div>
    <div class="chart-box">
      <div class="chart-title-inner">Πόσοι μαθητές ταξίδεψαν με κάθε μέσο;</div>
      <div style="position:relative;width:100%;height:280px;">
        <canvas id="theChart" role="img" aria-label="Ραβδόγραμμα μέσων μεταφοράς μαθητών τάξης"></canvas>
      </div>
      <div class="chart-legend" id="legend"></div>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
const TRANSPORTS = [
  { id: 'ship', name: 'Πλοίο', emoji: '🚢', color: '#1565C0', bg: '#E3F2FD' },
  { id: 'train', name: 'Τρένο', emoji: '🚆', color: '#E65100', bg: '#FFF3E0' },
  { id: 'tram', name: 'Τραμ', emoji: '🚋', color: '#00838F', bg: '#E0F7FA' },
  { id: 'metro', name: 'Μετρό', emoji: '🚇', color: '#2E7D32', bg: '#E8F5E9' },
  { id: 'plane', name: 'Αεροπλάνο', emoji: '✈️', color: '#4527A0', bg: '#EDE7F6' },
  { id: 'car', name: 'Αυτοκίνητο', emoji: '🚗', color: '#B71C1C', bg: '#FFEBEE' },
  { id: 'bus', name: 'Λεωφορείο', emoji: '🚌', color: '#F9A825', bg: '#FFFDE7' },
];

let selected = [];
let students = [];
let chart = null;

function renderCards() {
  const grid = document.getElementById('tGrid');
  grid.innerHTML = '';
  TRANSPORTS.forEach((t) => {
    const count = students.filter((s) => s.transports.includes(t.id)).length;
    const div = document.createElement('div');
    div.className = 't-card' + (selected.includes(t.id) ? ' sel' : '');
    div.innerHTML = `<span class="t-emoji">${t.emoji}</span><span class="t-label">${t.name}</span><span class="t-count">${count}</span>`;
    div.onclick = () => {
      if (selected.includes(t.id)) {
        selected = selected.filter((id) => id !== t.id);
      } else {
        selected = [...selected, t.id];
      }
      document.getElementById('hint').classList.remove('show');
      renderCards();
    };
    grid.appendChild(div);
  });
}

function addStudent() {
  const name = document.getElementById('nameInput').value.trim();
  if (!selected.length) {
    document.getElementById('hint').classList.add('show');
    return;
  }
  if (!name) {
    document.getElementById('nameInput').focus();
    return;
  }
  students.push({ name, transports: [...selected] });
  selected = [];
  document.getElementById('nameInput').value = '';
  showToast();
  renderAll();
}

function removeStudent(i) {
  students.splice(i, 1);
  renderAll();
}

function showToast() {
  const t = document.getElementById('toast');
  const msgs = ['⭐ Καταχωρήθηκε!', '🌟 Μπράβο!', '✨ Έγινε!', '🎉 Ωραία!'];
  t.textContent = msgs[Math.floor(Math.random() * msgs.length)];
  setTimeout(() => {
    t.textContent = '';
  }, 1600);
}

function renderChips() {
  const panel = document.getElementById('studentsPanel');
  const chips = document.getElementById('chips');
  if (!students.length) {
    panel.style.display = 'none';
    return;
  }
  panel.style.display = 'block';
  chips.innerHTML = '';
  students.forEach((s, i) => {
    const icons = s.transports
      .map((id) => {
        const t = TRANSPORTS.find((x) => x.id === id);
        return t ? t.emoji : '';
      })
      .join(' ');
    const chip = document.createElement('div');
    chip.className = 'chip';
    chip.innerHTML = `<span style="font-size:16px;">${icons}</span><span>${s.name}</span><button class="cx" onclick="removeStudent(${i})">×</button>`;
    chips.appendChild(chip);
  });
}

function renderChart() {
  const panel = document.getElementById('chartPanel');
  if (!students.length) {
    panel.style.display = 'none';
    return;
  }
  panel.style.display = 'block';
  const counts = TRANSPORTS.map((t) => students.filter((s) => s.transports.includes(t.id)).length);
  if (chart) chart.destroy();
  chart = new Chart(document.getElementById('theChart'), {
    type: 'bar',
    data: {
      labels: TRANSPORTS.map((t) => t.name),
      datasets: [{
        data: counts,
        backgroundColor: TRANSPORTS.map((t) => t.bg),
        borderColor: TRANSPORTS.map((t) => t.color),
        borderWidth: 2.5,
        borderRadius: 12,
        borderSkipped: false,
      }],
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: {
            label: (ctx) => ` ${ctx.parsed.y} μαθητ${ctx.parsed.y === 1 ? 'ής/ήτρια' : 'ές/ήτριες'}`,
          },
          bodyFont: { family: 'Nunito', weight: '700', size: 13 },
          titleFont: { family: 'Nunito', weight: '900', size: 14 },
        },
      },
      scales: {
        y: {
          beginAtZero: true,
          ticks: { stepSize: 1, font: { family: 'Nunito', weight: '700', size: 12 }, color: '#546E7A' },
          grid: { color: 'rgba(0,0,0,0.07)' },
          border: { display: false },
        },
        x: {
          ticks: { font: { family: 'Nunito', weight: '900', size: 13 }, color: '#1a1a2e' },
          grid: { display: false },
          border: { display: false },
        },
      },
      animation: { duration: 500, easing: 'easeOutQuart' },
    },
  });
  const legend = document.getElementById('legend');
  legend.innerHTML = TRANSPORTS.map(
    (t, i) => `<span style="display:flex;align-items:center;gap:6px;"><span style="font-size:18px;">${t.emoji}</span><span style="color:${t.color};font-weight:900;">${t.name}: ${counts[i]}</span></span>`
  ).join('');
}

function resetAll() {
  if (students.length && !confirm('Να διαγραφούν όλες οι καταχωρήσεις;')) return;
  students = [];
  selected = [];
  renderAll();
}

function renderAll() {
  renderCards();
  renderChips();
  renderChart();
}

document.getElementById('nameInput').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') addStudent();
});

renderAll();
</script>
</body>
</html>
